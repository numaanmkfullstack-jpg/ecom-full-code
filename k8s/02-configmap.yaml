apiVersion: v1
kind: ConfigMap
metadata:
  name: ecom-config
  namespace: ecom
data:
  # PostgreSQL
  POSTGRES_HOST: "postgres"
  POSTGRES_USER: "postgres"
  POSTGRES_PORT: "5432"

  # MongoDB (no auth)
  MONGO_HOST: "mongodb"
  MONGO_PORT: "27017"
  MONGO_DB:   "products"
  MONGO_USER: ""
  MONGO_PASS: ""

  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # Service-to-service hostnames (used by api-gateway and admin-ui)
  ORDER_SERVICE_HOST:     "order-service"
  PRODUCT_SERVICE_HOST:   "product-service"
  PAYMENT_SERVICE_HOST:   "payment-service"
  INVENTORY_SERVICE_HOST: "inventory-service"
  EMAIL_SERVICE_HOST:     "email-service"
  API_GATEWAY_HOST:       "api-gateway"

  # Email service
  EMAIL_SERVICE_URL: "http://email-service:3005"
  SEND_REAL_EMAIL:   "false"

  # Product service cache
  CACHE_ENABLED: "true"
  CACHE_TTL:     "300"
