apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: iamnmk777/ecom-order-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: ecom-config
        env:
        - name: POSTGRES_DB
          value: "orders"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ecom-secrets
              key: postgres-password
        # order-service amqplib expects a full amqp:// URI
        - name: RABBITMQ_HOST
          value: "amqp://rabbitmq:5672"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3002
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecom
spec:
  selector:
    app: order-service
  ports:
  - port: 3002
    targetPort: 3002
