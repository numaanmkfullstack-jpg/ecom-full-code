apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: ecom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
      - name: inventory-service
        image: iamnmk777/ecom-inventory-service:staging
        imagePullPolicy: Always
        ports:
        - containerPort: 3004
        envFrom:
        - configMapRef:
            name: ecom-config
        env:
        - name: POSTGRES_DB
          value: "inventory"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ecom-secrets
              key: postgres-password
        # inventory-service pika expects just the hostname (not a URI)
        - name: RABBITMQ_HOST
          value: "rabbitmq"
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: ecom
spec:
  selector:
    app: inventory-service
  ports:
  - port: 3004
    targetPort: 3004
