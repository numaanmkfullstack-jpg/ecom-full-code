apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-ui
  namespace: ecom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-ui
  template:
    metadata:
      labels:
        app: admin-ui
    spec:
      containers:
      - name: admin-ui
        image: iamnmk777/ecom-admin-ui:prod
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: ecom-config
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin-ui
  namespace: ecom
spec:
  selector:
    app: admin-ui
  ports:
  - port: 8080
    targetPort: 8080
