apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
  namespace: ecom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-service
  template:
    metadata:
      labels:
        app: email-service
    spec:
      containers:
      - name: email-service
        image: iamnmk777/ecom-email-service:prod
        imagePullPolicy: Always
        ports:
        - containerPort: 3005
        envFrom:
        - configMapRef:
            name: ecom-config
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: email-service
  namespace: ecom
spec:
  selector:
    app: email-service
  ports:
  - port: 3005
    targetPort: 3005
